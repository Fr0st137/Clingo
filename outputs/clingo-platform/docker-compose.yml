services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: clingo
      POSTGRES_USER: clingo
      POSTGRES_PASSWORD: clingo
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
